<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tu Ticket - Tech Store</title>
    <link rel="stylesheet" href="/ticket/css">
</head>
<body>
    <main class="ticket-container">
    <header>
        <h1>Tech Store</h1>
        <p>Comprobante de Compra</p>
    

        
        <p><strong>Cliente:</strong> <span id="cliente-ticket"></span></p>
    </header>

        <section id="detalle-compra">
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody id="lista-productos">

                
                    <tr><td>Ejemplo Producto</td><td>$</td></tr>
                </tbody>
            </table>
            <div class="total">
                <strong>Total: $</strong>
            </div>
        </section>

        <footer>
            <button onclick="window.print()">Imprimir Ticket</button>
            <!--Redireccion a la vista de bienvenida  -->
            <a href="/">Salir</a>
        </footer>
    </main>

    <script src="/ticket/js"></script>
</body>
</html>
