<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Ticket - Tech Store</title>
    <link class="favicon-pestana" rel="icon" href="./img/icono.ico" type="image/x-icon" sizes="32x32">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="navbar-tech">
        <div class="navbar-tech-brand">
            <img src="./img/logo.png" alt="Logo Tech Store">
            <h1>Tech Store</h1>
        </div>
        <div class="navbar-tech-derecha">
            <span style="color: rgba(255, 255, 255, 0.85); font-weight: bold; font-size: 1.1rem; background-color: rgba(255,255,255,0.15); padding: 5px 15px; border-radius: 15px;">Autoservicio</span>
        </div>
    </header>

    <main class="carrito-page">
        <div class="bandeja-carrito bandeja-ticket-ancho">
            
            <div class="ticket-header">
                <h2>Comprobante de Compra</h2>
                <p>¡Gracias por su compra!</p>
            </div>
            
            <p class="ticket-cliente">
                <strong>Cliente:</strong> <span id="cliente-ticket">Cargando...</span>
            </p>

            <table class="tabla-carrito">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th class="txt-derecha">Subtotal</th>
                    </tr>
                </thead>
                <tbody id="lista-productos">
                    <tr>
                        <td colspan="2" class="carrito-vacio-msg">Buscando datos del ticket...</td>
                    </tr>
                </tbody>
            </table>

            <div class="ticket-separador-total">
                <h3>Total Facturado:</h3>
                <span id="total-ticket" class="ticket-total-num">$0.00</span>
            </div>

            <div class="ticket-botonera">
                <button onclick="window.print()" class="btn-finalizar btn-secundario-gris">
                    Guardar PDF / Imprimir
                </button>
                <button id="btn-reiniciar" class="btn-finalizar">
                    Nueva Compra
                </button>
            </div>
        </div>
    </main>

    <script src="/ticket.js"></script>
</body>
</html>
