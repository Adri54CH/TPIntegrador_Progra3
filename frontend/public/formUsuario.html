<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de administrador</title>
    <link rel="stylesheet" href="/css/formUsuario.css">
</head>
<body>  

    <div class="container-form">

        <form class="form-administrador">
    
            <h1>Formulario Administrador</h1>
        
            <label>Nombre</label>
            <input type="text" class="form-nombre" required>
            
            <label for="">Email</label>
            <input type="email" class="form-email" required>
        
            <label for="">Contraseña</label>
            <input type="text" class="form-contrasena" required>
    
            <button type="submit"">Crear usuario</button>
            
        </form>


    </div>    

    <script src="/js/formUsuario.js"></script>
    
</body>
</html>
