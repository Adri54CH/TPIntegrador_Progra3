<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=   device-width, initial-scale=1.0">
    <title>Tech Store - Login Admin</title>
    <link class="favicon-pestana" rel="icon" href="/img/icono.ico" type="image/x-icon" sizes="32x32">
    <!-- 2 hojas de estilos  -->
    <link rel="stylesheet" href="/css/login.css ">   
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <header class="navbar-tech">
        <div class="navbar-tech-brand">
            <img src="/img/logo.png" alt="Logo Tech Store">
            <h1>Tech Store</h1>
        </div>
        <div class="grupo-filtros" style="margin: 0;">
            <a href="/" class="btn-navbar-nav">Panel Cliente</a>
        </div>
    </header>

    <main class="contenedor-login-centro">
        <div class="bandeja-carrito" style="max-width: 450px; text-align: center;">
            
            <h1 style="color: #222; margin-bottom: 10px; font-size: 2rem;">Login Administrador</h1>
            <p style="color: #666; margin-bottom: 25px; font-size: 0.95rem;">
                Área restringida para gestión de stock y ventas
            </p>

            <form class="form-datos" id="loginAdminForm">
                <div>
                    <label for="email">Correo Electrónico</label>
                    <input
                        type="email"
                        id="email"
                        class="correo-login" 
                        placeholder="admin@techstore.com"
                        required
                    >
                </div>

                <div>
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        class="contrasena-login" 
                        name="password"
                        placeholder="••••••••"
                        required
                    >
                </div>

                <button class="btn-finalizar" type="submit" style="width: 100%; margin-bottom: 15px;">Loguearse</button>
                
                <button class="btn-filtro" type="button" style="width: 100%; border-style: dashed; margin: 0;">Acceso Rápido (Profesores)</button>
            </form>
        </div>
    </main>

    <script src="/js/login-admin.js"></script>
</body>
</html>
