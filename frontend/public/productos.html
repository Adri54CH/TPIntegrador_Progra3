<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Store</title>
    <link class="favicon-pestana" rel="icon" href="/img/icono.ico" type="image/x-icon" sizes="32x32">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <header class="navbar-tech">
        <div class="navbar-tech-brand">
            <img src="/img/logo.png" alt="Logo Tech Store">
            <h1>Tech Store</h1>
            <span id="nombre-cliente"></span>
        </div>
        <div class="navbar-tech-cart">
            <button id="volver-inicio" class="btn-filtro" onclick="window.location.href='/login-cliente.html'">Ir a inicio</button>
            <button id="ver-carrito" class="btn-filtro" onclick="window.location.href='/carrito.html'">Ver Carrito (0)</button>
        </div>
    </header>

    <div class="panel-principal">
        <div class="centro-navegacion">
            <div class="grupo-filtros">
                <button class="btn-filtro activo" data-categoria="todos">Todos</button>
                <button class="btn-filtro" data-categoria="Mouses">Mouses</button>
                <button class="btn-filtro" data-categoria="Teclados">Teclados</button>
                <button class="btn-filtro" data-categoria="Audio">Audio</button>
                <button class="btn-filtro" data-categoria="Video">Video/Stream</button>
            </div>
        </div>

        <main id="grilla">
            </main>
    </div>

    <script type="module" src="/js/productos.js"></script>
</body>
</html>
