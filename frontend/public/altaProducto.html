<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="/css/altaProducto.css">
</head>
<body>
    
    <div id="modal">
        <div class="contenedor-modal">
        
            <div class="top-modal">

            <h1>Carga del producto</h1>
            <button id="cerrar-formulario">X</button>

            </div>
            <!-- atributo 'enctype' para poder enviar archivos-->
            <form action="" enctype="multipart/form-data">

                
                <div class="data">

                    <label for="">Ingrese el nombre del producto:</label>
                    <input type="text" id="input-nombre">
                </div>
                <div class="data">
                    
                    <label for="">Ingrese el precio del producto:</label>
                <input type="text" id="input-precio">
                </div>

                <div class="data">
                    
                    <label for="">Elija una imagen para el producto</label>
                    <!-- input para seleccionar una imagen -->
                <input type="file" id="imagen" name="imagen">
                </div>
                
                <div class="data">

                    <label for="">Ingrese la categoria del producto:</label>
                <input type="text" id="input-categoria">

                </div>

                <button id="btn-agregar-producto">Agregar producto</button>

                
            </form>



        </div>
        

    </div>

    <script src="/js/altaProducto.js"></script>
</body>
</html>
