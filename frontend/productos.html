<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Store</title>
    <link class="favicon-pestana" rel="icon" href="./img/logo.png" type="image/x-icon" sizes="32x32">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header class="navbar-tech" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; height: 110px;">
        <div style="display: flex; align-items: center; gap: 0px; height: 100%;">
            <img src="./img/logo.png" alt="Logo Tech Store" style="height: 90px; width: auto; object-fit: contain; display: block; margin-right: -15px;">
            <h1 style="margin: 0; padding: 0; font-size: 2.2rem; line-height: 1; display: flex; align-items: center;">Tech Store</h1>
            <span id="nombre-cliente" style="color: #e2e8f0; font-weight: 600; font-size: 1.1rem; background-color: rgba(255,255,255,0.15); padding: 5px 12px; border-radius: 15px; margin-left: 20px;"></span>
        </div>
        
        <div style="display: flex; gap: 15px; align-items: center;">
            <a href="./login-admin.html" style="color: white; text-decoration: none; font-weight: bold; font-size: 0.9rem; border: 1px solid white; padding: 8px 16px; border-radius: 20px;">Panel Admin</a>
            <a href="/carrito" id="ver-carrito" style="text-decoration: none;">Ver Carrito (0)</a>
        </div>
    </header>

    <div class="panel-principal">
        <div class="centro-navegacion">
            <div class="grupo-filtros">
                <button class="btn-filtro activo" data-categoria="todos">Todos</button>
                <button class="btn-filtro" data-categoria="Mouses">Mouses</button>
                <button class="btn-filtro" data-categoria="Teclados">Teclados</button>
                <button class="btn-filtro" data-categoria="Audio">Audio</button>
            </div>
        </div>

        <main id="grilla">
            </main>
    </div>

    <script type="module" src="/productos.js"></script>
</body>
</html>
