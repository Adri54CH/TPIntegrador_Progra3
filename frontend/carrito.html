<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito de Compras</title>
    <link rel="stylesheet" href="/carrito/css">
</head>
<header class="navbar-tech">
    <h1>Tech Store</h1>
    <a href="/productos" id="ver-carrito" style="text-decoration: none;">Volver al catálogo</a>
</header>

<main class="carrito-page">
    <!-- Esta es la bandeja -->
    <div class="bandeja-carrito">
        <h2>Carrito de compras</h2>
        
        <table class="tabla-carrito">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="carrito-body">
                <!-- Fila por defecto cuando no hay nada comprado -->
                <tr id="carrito-vacio-row">
                    <td colspan="3" class="carrito-vacio-msg">
                        Tu carrito está vacío
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="pie-carrito">
            <h3>Total: <span id="total-carrito">$0</span></h3>
            <button class="btn-finalizar">Finalizar Compra</button>
        </div>
    </div>
</main>

    <script src="/carrito/js"></script>
</body>
</html>
