<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Store - Carrito</title>
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="navbar-tech">
        <h1>Tech Store</h1>
        <a href="productos.html" id="ver-carrito" style="text-decoration: none;">Volver al catálogo</a>
    </header>

    <main class="carrito-page">
        <div class="bandeja-carrito">
            <h2>Carrito de compras</h2>
            
            <table class="tabla-carrito">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="carrito-body">
                    <tr id="carrito-vacio-row">
                        <td colspan="3" class="carrito-vacio-msg">
                            Tu carrito está vacío
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="pie-carrito">
                <h3>Total: <span id="total-carrito">$0</span></h3>
                <button class="btn-finalizar">Finalizar Compra</button>
            </div>
        </div>
    </main>

    <script src="./js/carrito.js"></script>
</body>
</html>
