<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title></title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1></h1>
        <nav>
            <a href="productos.html">Catálogo</a>
        </nav>
    </header>

    <main class="carrito-container">
        <h2>Carrito de compras</h2>
        
        <table id="tabla-carrito">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="contenido-carrito">
                <!-- Acá es donde tu JS va a inyectar los productos -->
            </tbody>
        </table>

        <div class="resumen-pago">
            <p>Total: <span id="total-carrito">$0</span></p>
            <button onclick="window.location.href='ticket.html'">Finalizar Compra</button>
        </div>
    </main>
</body>
</html>
