<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Store - Login Administrador</title>
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="carrito-page">
        <div class="bandeja-carrito" style="max-width: 450px; text-align: center;">
            <h1 style="color: #f8fafc; margin-bottom: 5px;">Login Administrador</h1>
            <p style="color: #94a3b8; margin-bottom: 25px; font-size: 0.9rem;">
                Área restringida para gestión de stock y ventas
            </p>
            
            <form class="form-datos" id="loginAdminForm">
                <div style="margin-bottom: 15px; text-align: left;">
                    <label for="adminCorreo" style="color: #f8fafc; display: block; margin-bottom: 6px; font-weight: 600;">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="adminCorreo" 
                        class="correo-login" 
                        style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background-color: #0f172a; color: white; font-size: 1rem;"
                        placeholder="admin@techstore.com" 
                        required
                    >
                </div>
                
                <div style="margin-bottom: 20px; text-align: left;">
                    <label for="adminPassword" style="color: #f8fafc; display: block; margin-bottom: 6px; font-weight: 600;">Contraseña</label>
                    <input 
                        type="password" 
                        id="adminPassword" 
                        class="contrasena-login" 
                        style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background-color: #0f172a; color: white; font-size: 1rem;"
                        placeholder="••••••••" 
                        required
                    >
                </div>
                
                <button class="btn-finalizar" type="submit" style="width: 100%; margin-bottom: 15px;">Loguearse</button>
                
                <button type="button" id="btnAccesoRapido" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px dashed #007bff; background-color: rgba(0, 123, 255, 0.1); color: #38bdf8; font-weight: bold; cursor: pointer; font-size: 0.85rem;">
                    Acceso Rápido (Profesores)
                </button>
            </form>
        </div>
    </main>
    
    <script src="/login-admin.js"></script>
</body>
</html>
