<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido al </title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="bienvenida-container">
        <header class="marca-header">
            <span class="tag-totem"></span>
            <h1>¡Hola! Te damos la bienvenida</h1>
            <p>Para comenzar con tu orden de compra, por favor decinos tu nombre.</p>
        </header>

        <form id="form-bienvenida" class="form-datos">
            <div class="input-group">
                <label for="nombre-cliente">Ingresá tu nombre</label>
                <input 
                    type="text" 
                    id="nombre-cliente" 
                    placeholder="Ej. Juan Pérez" 
                    autocomplete="off" 
                    required
                >
                
                <span class="error-mensaje" id="error-nombre"></span>
            </div>
            
            <button type="submit" class="btn-comenzar">
                Comenzar Compra
            </button>
        </form>

    </main>

</body>
</html>
