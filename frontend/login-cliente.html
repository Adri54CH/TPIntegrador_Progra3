<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Store - Ingreso Cliente</title>
    <link class="favicon-pestana" rel="icon" href="/icono.png" type="image/x-icon" sizes="32x32">
    <link rel="stylesheet" href="/clientecss">    
</head>
<body>

    <header class="navbar-tech">
        <div class="navbar-tech-brand">
            <img src="/logo.png" alt="Logo Tech Store">
            <h1>Tech Store</h1>
        </div>
        
        <div class="grupo-filtros" style="margin: 0;"> 
            <a href="./login-admin.html" class="btn-navbar-nav">Panel Admin</a>
        </div>
    </header>

    <main class="carrito-page">
        <div class="bandeja-carrito" style="max-width: 450px; text-align: center;">
            <h1 style="color: #222; margin-bottom: 10px;">¡Bienvenido!</h1>
            <p style="color: #666; margin-bottom: 25px; font-size: 0.95rem;">
                Ingresá tu nombre para empezar a comprar
            </p>

            <form class="form-datos" id="loginClienteForm">
                <div style="margin-bottom: 20px; text-align: left;">
                    <label for="nombre" style="color: #333; display: block; margin-bottom: 8px; font-weight: 600;">Su Nombre</label>
                    <input
                        type="text"
                        id="nombre"
                        class="correo-login" 
                        name="nombre"
                        minlength="2"
                        maxlength="30"
                        required
                        autocomplete="off"
                    >
                </div>

                <button class="btn-finalizar" type="submit" style="width: 100%;">Ingresar a la Tienda</button>
            </form>
        </div>
    </main>

    <script src="/clientejs"></script>
</body>
</html>
